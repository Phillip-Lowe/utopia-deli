<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <!-- Bottled Water -->
  <!-- Bottle body -->
  <rect x="70" y="55" width="60" height="115" rx="8" fill="none" stroke="#87CEEB" stroke-width="3"/>
  
  <!-- Bottle neck -->
  <rect x="85" y="35" width="30" height="20" rx="3" fill="none" stroke="#87CEEB" stroke-width="3"/>
  
  <!-- Bottle cap -->
  <rect x="82" y="25" width="36" height="12" rx="4" fill="#87CEEB" stroke="#5DADE2" stroke-width="2"/>
  
  <!-- Water fill (semi-transparent) -->
  <rect x="73" y="80" width="54" height="87" rx="6" fill="#B8E6F5" fill-opacity="0.5"/>
  
  <!-- Water line -->
  <line x1="73" y1="80" x2="127" y2="80" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Water bubbles -->
  <circle cx="90" cy="95" r="4" fill="#E0F4FF" stroke="#87CEEB" stroke-width="1.5"/>
  <circle cx="110" cy="110" r="3" fill="#E0F4FF" stroke="#87CEEB" stroke-width="1.5"/>
  <circle cx="95" cy="125" r="2.5" fill="#E0F4FF" stroke="#87CEEB" stroke-width="1.5"/>
  <circle cx="115" cy="140" r="3.5" fill="#E0F4FF" stroke="#87CEEB" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="78" y="110" width="44" height="28" rx="3" fill="#E0F4FF" stroke="#87CEEB" stroke-width="2"/>
  
  <!-- Label wave icon -->
  <path d="M 88,125 Q 95,118 102,125 Q 109,132 116,125" fill="none" stroke="#5DADE2" stroke-width="2" stroke-linecap="round"/>
</svg>