<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <!-- Chocolate Chip Cookies -->
  <!-- Cookie 1 (front) -->
  <circle cx="85" cy="115" r="40" fill="#D4A76A" stroke="#B8894A" stroke-width="2.5"/>
  
  <!-- Chips on cookie 1 -->
  <ellipse cx="72" cy="105" rx="6" ry="4" fill="#4A2C0A"/>
  <ellipse cx="95" cy="98" rx="5" ry="3.5" fill="#4A2C0A"/>
  <ellipse cx="105" cy="115" rx="7" ry="5" fill="#4A2C0A"/>
  <ellipse cx="85" cy="130" rx="5" ry="3" fill="#4A2C0A"/>
  <ellipse cx="65" cy="122" rx="4" ry="3" fill="#4A2C0A"/>
  <ellipse cx="100" cy="125" rx="6" ry="4" fill="#4A2C0A"/>
  <!-- Cookie 2 (back, slightly overlapping) -->
  <circle cx="125" cy="95" r="38" fill="#C9955C" stroke="#B8894A" stroke-width="2.5"/>
  
  <!-- Chips on cookie 2 -->
  <ellipse cx="115" cy="88" rx="5" ry="3.5" fill="#4A2C0A"/>
  <ellipse cx="135" cy="85" rx="6" ry="4" fill="#4A2C0A"/>
  <ellipse cx="140" cy="100" rx="5" ry="3" fill="#4A2C0A"/>
  <ellipse cx="120" cy="105" rx="4" ry="3" fill="#4A2C0A"/>
  <ellipse cx="130" cy="108" rx="5" ry="3.5" fill="#4A2C0A"/>
